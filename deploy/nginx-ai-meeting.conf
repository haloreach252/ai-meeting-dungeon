# Host nginx server block for the demo.
# Install on the ubuntu server as:
#   sudo cp deploy/nginx-ai-meeting.conf /etc/nginx/sites-available/ai-meeting.nathanruesch.com
#   sudo ln -s /etc/nginx/sites-available/ai-meeting.nathanruesch.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# Then add TLS (rewrites this block to listen on 443 automatically):
#   sudo certbot --nginx -d ai-meeting.nathanruesch.com

server {
    listen 80;
    listen [::]:80;
    server_name ai-meeting.nathanruesch.com;

    location / {
        proxy_pass http://127.0.0.1:8087;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
